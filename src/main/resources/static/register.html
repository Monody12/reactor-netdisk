<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
    <meta http-equiv="Pragma" content="no-cache"/>
    <meta http-equiv="Expires" content="0"/>

    <title>注册</title>
    <link rel="icon" href="img/favicon.ico">
    <link rel="stylesheet" type="text/css" href="css/elementUI.css"/>
    <script src="js/vue.js" type="text/javascript" charset="utf-8"></script>
    <script src="js/axios.js" type="text/javascript"></script>
    <script src="js/elementUI.js" type="text/javascript"></script>
    <style type="text/css">
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #register {

        }
    </style>
</head>
<body>
<div id="app">
    <div id="register">
        <h3 style="margin-left: 100px">注册新账号</h3>
        <el-form ref="form" :model="form" label-width="80px">
            <el-form-item label="用户名">
                <el-input v-model="form.username"></el-input>
            </el-form-item>
            <el-form-item label="密码">
                <el-input type="password" v-model="form.password"></el-input>
            </el-form-item>
            <el-form-item label="确认密码">
                <el-input type="password" v-model="form.confirmPassword"></el-input>
            </el-form-item>
            <p style="color: red">{{errorInfo}}</p>
            <p style="color: green">{{successInfo}}</p>
            <el-button type="primary" style="margin-left: 80px" @click="submitForm">注册</el-button>
            <el-link href="login.html" target="_blank" :underline="false" style="margin-left: 10px">返回登录</el-link>
        </el-form>
    </div>
</div>
</body>
<script>
    new Vue({
        el: '#app',
        data: {
            form: {
                username: "",
                password: "",
                confirmPassword: ""
            },
            errorInfo: "",
            successInfo: ""
        },
        mounted: function () {
            this.$nextTick(function () {
                    if (JSON.parse(localStorage.getItem("userinfo")) != null) {
                        window.location.assign("index.html")
                    }
                }
            )
        },
        methods: {
            submitForm() {
                if (navigator.cookieEnabled === false) {
                    alert("您的浏览器不支持cookie，请启用cookie或者更换浏览器。" +
                        "我们仅将cookie用于保存登录状态，不会跟踪您的隐私信息。")
                    return
                }
                if (!this.checkUsername(this.form.username))
                    this.errorInfo = "用户名格式错误，用户名需要3-18位字母、数字或下划线"
                else if (!this.checkPassword(this.form.password))
                    this.errorInfo = "密码格式错误，密码需要3-18位字母或数字"
                else if (this.form.password !== this.form.confirmPassword)
                    this.errorInfo = "两次输入的密码不一致"
                else {
                    this.errorInfo = ""
                    this.successInfo = ""
                    axios.post("./api/user/register", {
                        username: this.form.username,
                        password: this.form.password,
                        email: null
                    }).then(res => {
                        console.log("注册信息：", res.data)
                        var info = res.data
                        if (info.code == 200) {
                            this.successInfo = "注册成功！正在跳转至登录页面..."
                            setTimeout(() => {
                                window.location.assign("login.html")
                            }, 1500)
                        } else {
                            this.errorInfo = info.msg
                        }
                    }).catch(err => {
                        console.error(err)
                        this.errorInfo = err.response?.data?.msg || err.toString()
                    })
                }
            },
            checkUsername(s) {
                var pattern = /^\w{3,18}$/
                return pattern.test(s)
            },
            checkPassword(s) {
                var pattern = /^[A-Za-z0-9]{3,18}$/
                return pattern.test(s)
            }
        }
    })
</script>
</html>
